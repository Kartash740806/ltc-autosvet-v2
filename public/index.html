<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const user = tg.initDataUnsafe.user;
  if (user) {
    fetch('/api/users/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tg_id: user.id,
        username: user.username || '',
        first_name: user.first_name || ''
      })
    }).catch(err => console.error('Ошибка:', err));
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LTC Автосвет — Каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:    var(--tg-theme-bg-color,#F0EEEA);
  --sur:   var(--tg-theme-secondary-bg-color,#FFFFFF);
  --txt:   var(--tg-theme-text-color,#1A1A1A);
  --txt2:  var(--tg-theme-hint-color,#6B6560);
  --acc:   var(--tg-theme-button-color,#C94A0A);
  --atxt:  var(--tg-theme-button-text-color,#FFFFFF);
  --lnk:   var(--tg-theme-link-color,#FF6B2B);
  --brd:   #E2DED8;
  --r:     13px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.45;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}

/* topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--sur);border-bottom:1px solid var(--brd);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.logo{font-family:Georgia,serif;font-size:18px;font-weight:700;letter-spacing:2px;}
.logo span{color:var(--acc);}
.logo-sub{flex:1;font-size:11px;color:var(--txt2);}
.count-badge{font-size:11px;font-weight:700;background:var(--acc);color:var(--atxt);padding:3px 9px;border-radius:20px;}

/* filters */
.filters{display:flex;gap:6px;padding:10px 12px 6px;overflow-x:auto;}
.filters::-webkit-scrollbar{display:none;}
.chip{padding:6px 13px;border-radius:20px;border:1.5px solid var(--brd);background:var(--bg);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.chip.on{background:var(--acc);border-color:var(--acc);color:var(--atxt);}

/* grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 12px 80px;}
.card{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);overflow:hidden;cursor:pointer;transition:transform .15s;}
.card:active{transform:scale(.97);}
.card-img{width:100%;height:120px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-ph{font-size:36px;}
.card-body{padding:10px 10px 12px;}
.card-cat{font-size:10px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.card-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:5px;}
.card-price{font-size:15px;font-weight:800;color:var(--acc);}
.card-desc{font-size:11px;color:var(--txt2);line-height:1.4;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* state */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px;}
.state-icon{font-size:48px;}
.spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* overlay / sheet */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.on{opacity:1;pointer-events:all;}
.sheet{width:100%;background:var(--sur);border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.85,.36,1);box-shadow:0 -6px 30px rgba(0,0,0,.15);}
.overlay.on .sheet{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sh-head{display:flex;align-items:flex-start;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--brd);flex-shrink:0;}
.sh-info{flex:1;}
.sh-cat{font-size:10px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sh-name{font-size:17px;font-weight:800;line-height:1.3;}
.sh-close{width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt2);}
.sh-body{flex:1;overflow-y:auto;padding:14px 16px 20px;}
.sh-img{width:100%;height:200px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px;}
.sh-img img{width:100%;height:100%;object-fit:contain;}
.sh-price{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:10px;}
.sh-desc{font-size:13px;color:var(--txt2);line-height:1.6;white-space:pre-line;}
.sh-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:12px;font-weight:700;color:var(--lnk);text-decoration:none;}
.sh-foot{flex-shrink:0;padding:12px 16px max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--r);background:var(--acc);color:var(--atxt);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.btn-primary:active{opacity:.85;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">LT<span>C</span></div>
  <div class="logo-sub">Профессиональный автосвет</div>
  <div class="count-badge" id="topCount">—</div>
</div>

<div class="filters" id="filters"></div>
<div id="content">
  <div class="state"><div class="spinner"></div><div style="color:var(--txt2)">Загружаем каталог…</div></div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <div class="sh-info">
        <div class="sh-cat"  id="dCat"></div>
        <div class="sh-name" id="dName"></div>
      </div>
      <button class="sh-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body">
      <div class="sh-img"   id="dImg"></div>
      <div class="sh-price" id="dPrice"></div>
      <div class="sh-desc"  id="dDesc"></div>
      <a   class="sh-link"  id="dLink" href="#" target="_blank" style="display:none">🔗 Подробнее</a>
    </div>
    <div class="sh-foot">
      <button class="btn-primary" id="btnContact">✉️ Уточнить наличие</button>
    </div>
  </div>
</div>

<script>
const tg  = window.Telegram?.WebApp;
const API = '';  // тот же origin или https://ваш-сервер.com
const CAT_LABELS = { biled:'Bi-LED линзы', lamp:'LED лампы', ptf:'Фары / ПТФ', gabarit:'Габаритные фонари' };
const CAT_ICONS  = { biled:'🔆', lamp:'⚡', ptf:'🌫️', gabarit:'🔴' };

if (tg) { tg.ready(); tg.expand(); }

let ALL = [], activeFilter = 'all';

// ── 1. Авто-регистрация клиента ───────────────────────────
(async function registerUser() {
  try {
    const user = tg?.initDataUnsafe?.user;
    // В браузере без Telegram — пропускаем, не падаем
    if (!user?.id) return;
    await fetch(API + '/api/client/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ tg_id: user.id, username: user.username, first_name: user.first_name }),
    });
  } catch (e) {
    // Молча проглатываем: регистрация не должна ломать каталог
    console.warn('Register skipped:', e.message);
  }
})();

// ── 2. Загрузка товаров ───────────────────────────────────
async function loadProducts() {
  try {
    const r    = await fetch(API + '/api/client/products');
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    ALL = data.products;
    renderFilters();
    renderGrid(ALL);
    document.getElementById('topCount').textContent = ALL.length + ' тов.';
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="state"><div class="state-icon">😔</div>
       <div style="font-weight:700">Не удалось загрузить каталог</div>
       <div style="font-size:12px;color:var(--txt2)">${esc(e.message)}</div></div>`;
  }
}

// ── Фильтры ───────────────────────────────────────────────
function renderFilters() {
  const cats = ['all', ...new Set(ALL.map(p => p.category))];
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<div class="chip ${c === activeFilter ? 'on' : ''}" onclick="setFilter('${c}')">
      ${c === 'all' ? 'Все товары' : (CAT_ICONS[c] || '') + ' ' + (CAT_LABELS[c] || c)}
    </div>`
  ).join('');
}
function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderGrid(cat === 'all' ? ALL : ALL.filter(p => p.category === cat));
}

// ── Сетка ─────────────────────────────────────────────────
function renderGrid(products) {
  if (!products.length) {
    document.getElementById('content').innerHTML =
      '<div class="state"><div class="state-icon">🔦</div><div style="font-weight:700">Товаров не найдено</div></div>';
    return;
  }
  document.getElementById('content').innerHTML =
    '<div class="grid">' + products.map(cardHTML).join('') + '</div>';
}
function cardHTML(p) {
  const img = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="card-ph">${CAT_ICONS[p.category] || '📦'}</div>`;
  return `<div class="card" onclick="openSheet(${p.id})">
    <div class="card-img">${img}</div>
    <div class="card-body">
      <div class="card-cat">${esc(CAT_LABELS[p.category] || p.category)}</div>
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-price">${fmt(p.price)} ₽</div>
      ${p.description ? `<div class="card-desc">${esc(p.description)}</div>` : ''}
    </div>
  </div>`;
}

// ── Шторка детали ─────────────────────────────────────────
function openSheet(id) {
  const p = ALL.find(x => x.id === id);
  if (!p) return;
  document.getElementById('dCat').textContent   = CAT_LABELS[p.category] || p.category;
  document.getElementById('dName').textContent  = p.name;
  document.getElementById('dPrice').textContent = fmt(p.price) + ' ₽';
  document.getElementById('dDesc').textContent  = p.description || '';
  const imgWrap = document.getElementById('dImg');
  imgWrap.innerHTML = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="">`
    : `<span style="font-size:48px">${CAT_ICONS[p.category] || '📦'}</span>`;
  const dLink = document.getElementById('dLink');
  dLink.href = p.hyperlink || '#';
  dLink.style.display = p.hyperlink ? 'inline-flex' : 'none';
  document.getElementById('btnContact').onclick = () => contactManager(p);
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
  try { tg?.HapticFeedback?.impactOccurred('light'); } catch(e) {}
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow = '';
}
function overlayClick(e) { if (e.target.id === 'overlay') closeSheet(); }

function contactManager(p) {
  const text = encodeURIComponent(`Здравствуйте! Интересует: "${p.name}" (${fmt(p.price)} ₽)`);
  const url  = `https://t.me/lelik1159?text=${text}`;
  tg?.openTelegramLink ? tg.openTelegramLink(url) : window.open(url, '_blank');
}

function fmt(n) { return Number(n).toLocaleString('ru-RU'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadProducts();
</script>
</body>
</html>
