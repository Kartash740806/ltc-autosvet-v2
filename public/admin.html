<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>LTC Автосвет — Администратор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:   var(--tg-theme-bg-color,#F0EEEA);
  --sur:  var(--tg-theme-secondary-bg-color,#FFFFFF);
  --txt:  var(--tg-theme-text-color,#1A1A1A);
  --txt2: var(--tg-theme-hint-color,#6B6560);
  --acc:  var(--tg-theme-button-color,#C94A0A);
  --atxt: var(--tg-theme-button-text-color,#FFFFFF);
  --grn:  #16A34A; --grn-s:#DCFCE7;
  --red:  #DC2626; --red-s:#FEF2F2;
  --blu:  #1D4ED8; --blu-s:#EFF6FF;
  --brd:  #E2DED8;
  --r:    13px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input,select,textarea{font-family:inherit;}

/* topbar */
.topbar{position:sticky;top:0;z-index:100;background:#111;border-bottom:1px solid #333;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.logo{font-family:Georgia,serif;font-size:18px;font-weight:700;letter-spacing:2px;color:#fff;}
.logo span{color:#FF6B2B;}
.badge{font-size:10px;font-weight:700;background:#FF6B2B;color:#fff;padding:2px 8px;border-radius:10px;}
.topbar-right{margin-left:auto;font-size:11px;color:rgba(255,255,255,.45);}

/* tabs */
.tabs{display:flex;background:#1a1a1a;border-bottom:1px solid #333;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:11px 12px;font-size:11px;font-weight:700;text-align:center;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.on{color:#fff;border-bottom-color:#FF6B2B;}

/* sections */
.sec{display:none;padding:12px 12px 80px;}
.sec.on{display:block;}

/* form */
.box{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);padding:14px;margin-bottom:12px;}
.box h3{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.frow.full{grid-template-columns:1fr;}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--brd);border-radius:9px;background:var(--bg);font-size:13px;color:var(--txt);outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--acc);}
textarea.fi{resize:vertical;min-height:64px;}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-size:14px;font-weight:800;margin-top:8px;transition:opacity .15s;cursor:pointer;}
.btn:active{opacity:.85;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-acc{background:linear-gradient(135deg,#D94200,#C94A0A);color:#fff;box-shadow:0 3px 12px rgba(201,74,10,.28);}
.btn-blu{background:linear-gradient(135deg,#1e3a8a,#1D4ED8);color:#fff;box-shadow:0 3px 12px rgba(29,78,216,.26);}

/* product list */
.plist{display:flex;flex-direction:column;gap:8px;}
.pcard{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);display:flex;align-items:center;gap:10px;padding:10px 12px;transition:border-color .2s,background .2s;}
.pcard.off{background:#fafafa;border-color:#ebe8e3;opacity:.62;}
.pthumb{width:54px;height:46px;border-radius:8px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pthumb img{width:100%;height:100%;object-fit:cover;}
.pinfo{flex:1;min-width:0;}
.pid{font-size:9px;color:var(--txt2);font-weight:600;}
.pname{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:2px;}
.pmeta{font-size:11px;color:var(--txt2);}
.pprice{font-size:13px;font-weight:800;color:var(--acc);}
.pactions{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot.on{background:var(--grn);}
.dot.off{background:var(--red);}
.btog{padding:6px 11px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btog:active{opacity:.8;}
.btog.hide{background:var(--red-s);border-color:rgba(220,38,38,.2);color:var(--red);}
.btog.show{background:var(--grn-s);border-color:rgba(22,163,74,.3);color:var(--grn);}

/* user list */
.ulist{display:flex;flex-direction:column;gap:6px;}
.ucard{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);display:flex;align-items:center;gap:10px;padding:10px 12px;}
.uava{width:36px;height:36px;border-radius:50%;background:var(--blu-s);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.uinfo{flex:1;min-width:0;}
.uname{font-size:13px;font-weight:700;}
.umeta{font-size:11px;color:var(--txt2);}
.uid{font-size:10px;color:var(--txt2);font-weight:600;}

/* access denied screen */
.denied{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;padding:30px;text-align:center;gap:14px;}
.denied-ico{font-size:56px;}
.denied-title{font-size:18px;font-weight:800;color:var(--red);}
.denied-sub{font-size:13px;color:var(--txt2);line-height:1.6;max-width:280px;}

/* state */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
#toast{position:fixed;top:0;left:0;right:0;z-index:9999;transform:translateY(-110%);transition:transform .25s cubic-bezier(.22,.85,.36,1);}
.tbar{margin:10px 14px;border-radius:12px;padding:11px 16px;font-size:13px;font-weight:700;text-align:center;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.22);}
.tbar.ok{background:#15803d;}
.tbar.err{background:#DC2626;}
.tbar.info{background:#1A1A1A;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">LT<span>C</span></div>
  <div class="badge">ADMIN</div>
  <div class="topbar-right" id="topCount">—</div>
</div>

<div class="tabs">
  <div class="tab on"  id="tabAll"     onclick="sw('all')">ВСЕ</div>
  <div class="tab"     id="tabActive"  onclick="sw('active')">АКТИВНЫЕ</div>
  <div class="tab"     id="tabHidden"  onclick="sw('hidden')">СКРЫТЫЕ</div>
  <div class="tab"     id="tabAdd"     onclick="sw('add')">➕</div>
  <div class="tab"     id="tabSettings" onclick="sw('settings')">⚙️ НАСТРОЙКИ</div>
</div>

<div class="sec on" id="secAll"></div>
<div class="sec"    id="secActive"></div>
<div class="sec"    id="secHidden"></div>

<!-- Добавление товара -->
<div class="sec" id="secAdd">
  <div class="box">
    <h3>➕ Новый товар</h3>
    <div class="frow full"><input class="fi" id="fName"  type="text"   placeholder="Название *"></div>
    <div class="frow">
      <select class="fi" id="fCat">
        <option value="biled">Bi-LED линзы</option>
        <option value="lamp" selected>LED лампы</option>
        <option value="ptf">Фары / ПТФ</option>
        <option value="gabarit">Габаритные фонари</option>
      </select>
      <input class="fi" id="fPrice" type="number" placeholder="Цена (руб.) *" min="0">
    </div>
    <div class="frow full"><input class="fi" id="fImg"   type="url" placeholder="Ссылка на фото"></div>
    <div class="frow full"><input class="fi" id="fHyper" type="url" placeholder="Гиперссылка"></div>
    <div class="frow full"><textarea class="fi" id="fDesc" placeholder="Описание / характеристики"></textarea></div>
    <button class="btn btn-acc" id="btnAdd" onclick="addProduct()">Добавить товар</button>
  </div>
</div>

<!-- Настройки и подписчики -->
<div class="sec" id="secSettings">
  <!-- Подписчики -->
  <div class="box">
    <h3>👥 База подписчиков <span id="usersTotal" style="font-size:11px;font-weight:500;color:var(--txt2)"></span></h3>
    <div id="usersList"><div class="state"><div class="spinner"></div></div></div>
  </div>
  <!-- Добавить менеджера -->
  <div class="box">
    <h3>🔐 Добавить менеджера</h3>
    <div style="font-size:12px;color:var(--txt2);margin-bottom:10px;line-height:1.5;">Введите Telegram ID нового менеджера.<br>После этого он получит доступ к административным функциям.</div>
    <div class="frow">
      <input class="fi" id="mgrTgId" type="number" placeholder="Telegram ID *">
      <select class="fi" id="mgrRole">
        <option value="manager" selected>Менеджер</option>
        <option value="superadmin">Суперадмин</option>
      </select>
    </div>
    <button class="btn btn-blu" id="btnMgr" onclick="addManager()">Назначить менеджера</button>
  </div>
</div>

<div id="toast"><div class="tbar" id="toastBar"></div></div>

<script>
const tg  = window.Telegram?.WebApp;
const API = '';  // тот же origin или https://ваш-сервер.com

if (tg) { tg.ready(); tg.expand(); }

// ── Telegram ID текущего пользователя ─────────────────────
const MY_TG_ID = tg?.initDataUnsafe?.user?.id || null;

let ALL = [];

// ── Заголовки для всех admin-запросов ─────────────────────
function adminHeaders(extra) {
  return Object.assign(
    { 'Content-Type': 'application/json' },
    MY_TG_ID ? { 'x-tg-user-id': String(MY_TG_ID) } : {},
    extra || {}
  );
}

// ── Обработка ошибок доступа ──────────────────────────────
function handleForbidden(status) {
  if (status === 401 || status === 403) {
    document.querySelector('.tabs').style.display  = 'none';
    document.querySelectorAll('.sec').forEach(s => { s.classList.remove('on'); s.style.display='none'; });
    document.body.insertAdjacentHTML('beforeend',
      `<div class="denied">
        <div class="denied-ico">🚫</div>
        <div class="denied-title">Доступ запрещён</div>
        <div class="denied-sub">Ваш Telegram-аккаунт не имеет прав администратора.<br>Обратитесь к главному администратору.</div>
       </div>`
    );
    return true;
  }
  return false;
}

// ── Загрузка товаров ──────────────────────────────────────
async function loadProducts() {
  document.getElementById('secAll').innerHTML = '<div class="state"><div class="spinner"></div></div>';
  try {
    const r = await fetch(API + '/api/admin/products', { headers: adminHeaders() });
    if (handleForbidden(r.status)) return;
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    ALL = data.products;
    renderAll();
    document.getElementById('topCount').textContent = ALL.length + ' тов.';
  } catch (e) {
    document.getElementById('secAll').innerHTML =
      `<div class="state"><div style="font-size:36px">😔</div><b>Ошибка загрузки</b><div style="color:var(--txt2);font-size:12px;">${esc(e.message)}</div></div>`;
  }
}

// ── Рендер списков товаров ────────────────────────────────
const CAT_LABELS = { biled:'Bi-LED линзы', lamp:'LED лампы', ptf:'Фары / ПТФ', gabarit:'Габаритные фонари' };
const CAT_ICONS  = { biled:'🔆', lamp:'⚡', ptf:'🌫️', gabarit:'🔴' };

function renderAll() {
  document.getElementById('secAll').innerHTML    = listHTML(ALL);
  document.getElementById('secActive').innerHTML = listHTML(ALL.filter(p =>  p.is_active));
  document.getElementById('secHidden').innerHTML = listHTML(ALL.filter(p => !p.is_active));
}
function listHTML(products) {
  if (!products.length) return '<div class="state"><div style="font-size:36px">📭</div><b>Список пуст</b></div>';
  return '<div class="plist">' + products.map(pCardHTML).join('') + '</div>';
}
function pCardHTML(p) {
  const img = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="" onerror="this.style.display='none'">`
    : `<span style="font-size:22px">${CAT_ICONS[p.category] || '📦'}</span>`;
  return `<div class="pcard ${p.is_active ? '' : 'off'}" id="pc_${p.id}">
    <div class="pthumb">${img}</div>
    <div class="pinfo">
      <div class="pid">#${p.id} · ${esc(CAT_LABELS[p.category] || p.category)}</div>
      <div class="pname">${esc(p.name)}</div>
      <div class="pprice">${fmt(p.price)} ₽</div>
      ${p.description ? `<div class="pmeta">${esc(p.description.slice(0,60))}${p.description.length>60?'…':''}</div>` : ''}
    </div>
    <div class="pactions">
      <div class="dot ${p.is_active ? 'on' : 'off'}"></div>
      <button class="btog ${p.is_active ? 'hide' : 'show'}" onclick="toggleProduct(${p.id}, this)">
        ${p.is_active ? 'Скрыть' : 'Показать'}
      </button>
    </div>
  </div>`;
}

// ── Toggle ────────────────────────────────────────────────
async function toggleProduct(id, btn) {
  btn.disabled  = true;
  const prev    = btn.textContent;
  btn.textContent = '…';
  try {
    const r = await fetch(`${API}/api/admin/products/${id}/toggle`, {
      method:  'PATCH',
      headers: adminHeaders(),
    });
    if (handleForbidden(r.status)) return;
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    const idx = ALL.findIndex(p => p.id === id);
    if (idx >= 0) ALL[idx].is_active = data.product.is_active;
    renderAll();
    toast('✅ Статус обновлён', 'ok');
    try { tg?.HapticFeedback?.impactOccurred('light'); } catch(e) {}
  } catch (e) {
    btn.textContent = prev;
    btn.disabled    = false;
    toast('❌ ' + e.message, 'err');
  }
}

// ── Добавление товара ─────────────────────────────────────
async function addProduct() {
  const name  = document.getElementById('fName').value.trim();
  const price = document.getElementById('fPrice').value;
  if (!name)           { toast('❌ Введите название', 'err'); return; }
  if (!price || +price < 0) { toast('❌ Введите цену', 'err'); return; }
  const btn = document.getElementById('btnAdd');
  btn.disabled = true; btn.textContent = 'Добавляем…';
  try {
    const r = await fetch(API + '/api/admin/products/add', {
      method: 'POST',
      headers: adminHeaders(),
      body: JSON.stringify({
        name, price: +price,
        category:    document.getElementById('fCat').value,
        image_url:   document.getElementById('fImg').value.trim(),
        description: document.getElementById('fDesc').value.trim(),
        hyperlink:   document.getElementById('fHyper').value.trim() || null,
      }),
    });
    if (handleForbidden(r.status)) return;
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    ALL.unshift(data.product);
    renderAll();
    document.getElementById('topCount').textContent = ALL.length + ' тов.';
    ['fName','fPrice','fImg','fDesc','fHyper'].forEach(id => { document.getElementById(id).value = ''; });
    toast('✅ Товар добавлен', 'ok');
    sw('all');
    try { tg?.HapticFeedback?.impactOccurred('medium'); } catch(e) {}
  } catch (e) {
    toast('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Добавить товар';
  }
}

// ── Загрузка подписчиков ──────────────────────────────────
async function loadUsers() {
  document.getElementById('usersList').innerHTML = '<div class="state"><div class="spinner"></div></div>';
  try {
    const r = await fetch(API + '/api/admin/users', { headers: adminHeaders() });
    if (handleForbidden(r.status)) return;
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    document.getElementById('usersTotal').textContent = '(' + data.total + ')';
    if (!data.users.length) {
      document.getElementById('usersList').innerHTML =
        '<div style="text-align:center;color:var(--txt2);padding:20px;font-size:13px;">Подписчиков пока нет</div>';
      return;
    }
    document.getElementById('usersList').innerHTML =
      '<div class="ulist">' + data.users.map(u => {
        const name    = [u.first_name, u.username ? '@' + u.username : ''].filter(Boolean).join(' · ') || 'Без имени';
        const dateStr = new Date(u.created_at).toLocaleDateString('ru-RU', { day:'2-digit', month:'short', year:'numeric' });
        return `<div class="ucard">
          <div class="uava">👤</div>
          <div class="uinfo">
            <div class="uname">${esc(name)}</div>
            <div class="uid">TG ID: ${u.tg_id}</div>
            <div class="umeta">Зашёл: ${dateStr}</div>
          </div>
        </div>`;
      }).join('') + '</div>';
  } catch (e) {
    document.getElementById('usersList').innerHTML =
      `<div style="text-align:center;color:var(--red);padding:14px;font-size:12px;">❌ ${esc(e.message)}</div>`;
  }
}

// ── Добавление менеджера ──────────────────────────────────
async function addManager() {
  const tgId = parseInt(document.getElementById('mgrTgId').value, 10);
  const role = document.getElementById('mgrRole').value;
  if (!tgId || isNaN(tgId)) { toast('❌ Введите корректный Telegram ID', 'err'); return; }
  const btn = document.getElementById('btnMgr');
  btn.disabled = true; btn.textContent = 'Назначаем…';
  try {
    const r = await fetch(API + '/api/admin/managers/add', {
      method:  'POST',
      headers: adminHeaders(),
      body:    JSON.stringify({ tg_id: tgId, role }),
    });
    if (handleForbidden(r.status)) return;
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    document.getElementById('mgrTgId').value = '';
    toast('✅ Менеджер добавлен (TG ID: ' + data.admin.tg_id + ')', 'ok');
    try { tg?.HapticFeedback?.impactOccurred('medium'); } catch(e) {}
  } catch (e) {
    toast('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Назначить менеджера';
  }
}

// ── Вкладки ───────────────────────────────────────────────
function sw(name) {
  ['all','active','hidden','add','settings'].forEach(t => {
    document.getElementById('tab' + cap(t)).classList.toggle('on', t === name);
    document.getElementById('sec' + cap(t)).classList.toggle('on', t === name);
  });
  // При переходе на настройки — загружаем подписчиков
  if (name === 'settings') loadUsers();
}
function cap(s) {
  if (s === 'settings') return 'Settings';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ── Утилиты ───────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('ru-RU'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _tt;
function toast(msg, type) {
  const bar = document.getElementById('toastBar');
  bar.textContent = msg; bar.className = 'tbar ' + (type || 'info');
  const inner = document.getElementById('toast');
  inner.style.transform = 'translateY(0)';
  clearTimeout(_tt);
  _tt = setTimeout(() => { inner.style.transform = 'translateY(-110%)'; }, 2800);
}

loadProducts();
</script>
</body>
</html>
